<!DOCTYPE html>
<html lang="en">
<head>
    <title>Found items List</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body onload="get()">
<div id="output"></div>

<form>
    <button type="button"   id="FoundItemInputButton"  onclick="FoundItemInput()">Post Item Found</button>
    <button type="button"   id="HomePageButton"  onclick="HomePage()">Home Page</button>
</form>

<script>    
    function FoundItemInput(){
        window.location.href = "FoundItemInput.html";
    }
    function HomePage(){
    window.location.href = "HomePage.html";
    }
</script>

<script>
        function get(){  
        var imgData = localStorage.getItem("FoundInputImage");
        
        var get = {
            description: localStorage.getItem("FoundInputDesciption"),
            location: localStorage.getItem("FoundInputLocation"),
            date: localStorage.getItem("FoundInputDate"),
            time: localStorage.getItem("FoundInputTime"),
            contact: localStorage.getItem("FoundInputContact"),
            remark: localStorage.getItem("FoundInputRemark")
        };

        var types = JSON.parse(localStorage.getItem("FoundInputType"));

        var typeText = "";
        if (types) {
            typeText = types.join(", ");
        }

        var output = document.getElementById("output")
        output.innerHTML = `
            <img src="${imgData}" width="200">;
            <p>Description: ${get.description}</p>
            <p>Location: ${get.location}</p>
            <p>Date: ${get.date}</p>
            <p>Time: ${get.time}</p>
            <p>Type: ${typeText}</p>
            <p>Contact: ${get.contact}</p>
            <p>Remark: ${get.remark}</p>
        `;
    }
</script>
</body>
</html>
