<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter</title>
    <link rel="stylesheet" href="Filter_styles.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <h1>Lost & Found</h1>
            </div>
            <p class="subtitle">Helping you quickly find your lost items</p>
        </header>

        <main class="filter-section">
            <div class="filter-card">
                <div class="card-header">
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"></path>
                    </svg>
                    <h2>Filters</h2>
                </div>

                <form id="filterForm" class="filter-form">
                    <!-- Item Category Filter -->
                    <div class="form-group">
                        <label class="form-label">
                            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                <line x1="7" y1="7" x2="7.01" y2="7"></line>
                            </svg>
                            Item Category
                        </label>
                        <!-- Category cards are dynamically generated from CATEGORIES config in script.js -->
                        <div class="category-grid"></div>
                    </div>

                    <!-- Date Filter -->
                    <div class="form-group">
                        <label class="form-label">
                            <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            Date Lost
                        </label>
                        <div class="date-section">
                            <div class="date-inputs">
                                <div class="date-field">
                                    <label for="startDate">Start Date</label>
                                    <input type="date" id="startDate" name="startDate">
                                </div>
                                <div class="date-separator">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                        <polyline points="12 5 19 12 12 19"></polyline>
                                    </svg>
                                </div>
                                <div class="date-field">
                                    <label for="endDate">End Date</label>
                                    <input type="date" id="endDate" name="endDate">
                                </div>
                            </div>
                            <div class="quick-dates">
                                <button type="button" class="quick-date-btn" data-days="7">Last 7 Days</button>
                                <button type="button" class="quick-date-btn" data-days="30">Last 30 Days</button>
                                <button type="button" class="quick-date-btn" data-days="90">Last 3 Months</button>
                                <button type="button" class="quick-date-btn" data-days="0">All Time</button>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="form-actions">
                        <button type="button" id="resetBtn" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                            </svg>
                            Reset
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            Search
                        </button>
                    </div>
                </form>
            </div>

            <!-- Filter Preview -->
            <div class="result-preview">
                <div class="preview-header">
                    <h3>Current Filters</h3>
                    <span id="resultCount" class="result-count">0 selected</span>
                </div>
                <div id="selectedFilters" class="selected-filters">
                    <p class="no-filter">No filters applied</p>
                </div>
            </div>

            <!-- Search Results -->
            <div class="results-section" id="resultsSection">
                <div class="results-header">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        Search Results
                    </h3>
                    <span id="matchCount" class="match-count">0 records found</span>
                </div>
                <div id="resultsList" class="results-list">
                    <p class="no-results">Select filters and click "Search" to view results</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 Lost & Found System. All rights reserved.</p>
        </footer>
    </div>

    <script src="Filter.js"></script>
</body>
</html>
