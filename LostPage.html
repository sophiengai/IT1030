<!DOCTYPE html>
<html>
<head>
<title>Lost Page</title>
</head>
<body onload="get()">
<div id="output"></div>

<form>
    <button type="button"   id="LostItemInputButton"  onclick="LostInputItem()">Post Item Lost</button>
    <button type="button"   id="HomePageButton"  onclick="HomePage()">Home Page</button>
    <button type="button"   id="Sort"  onclick="sortAlphabetically()">Sorting</button>
</form>

<script>
    function LostInputItem(){
        window.location.href = "LostItemInput.html";
    }
    function HomePage(){
        window.location.href = "HomePage.html";
    }
</script>

<script>
    function sortAlphabetically(items, key, direction = "asc") {

        if (!Array.isArray(items) || items.length === 0) {
            return [];
        }

        if (typeof key !== "string" || !key.trim()) {
            console.warn("sortAlphabetically: Invalid or empty key. Returning original array.");
            return [...items];
        }

        return [...items].sort((a, b) => {

            const valA = (a[key] || "").toString().trim().toLowerCase();
            const valB = (b[key] || "").toString().trim().toLowerCase();

            if (valA < valB) return direction === "asc" ? -1 : 1;
            if (valA > valB) return direction === "asc" ? 1 : -1;

            return 0;
        });
    }

</script>

<script>
    function get(){  
        var imgData = localStorage.getItem("LostInputImage");
        
        var get = {
            description: localStorage.getItem("LostInputDesciption"),
            location: localStorage.getItem("LostInputLocation"),
            date: localStorage.getItem("LostInputDate"),
            time: localStorage.getItem("LostInputTime"),
            contact: localStorage.getItem("LostInputContact"),
            remark: localStorage.getItem("LostInputRemark")
        };

        var types = JSON.parse(localStorage.getItem("LostInputType"));

        var typeText = "";
        if (types) {
            typeText = types.join(", ");
        }

        var output = document.getElementById("output")
        output.innerHTML = `
            <img src="${imgData}" width="200">;
            <p>Description: ${get.description}</p>
            <p>Location: ${get.location}</p>
            <p>Date: ${get.date}</p>
            <p>Time: ${get.time}</p>
            <p>Type: ${typeText}</p>
            <p>Contact: ${get.contact}</p>
            <p>Remark: ${get.remark}</p>
        `;
    }
</script>

</body>
</html>
