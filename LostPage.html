<!DOCTYPE html>
<html>
<head>
    <title>Lost Page</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body onload="get()">
<div id="output"></div>

<form>
    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search">
            <button id="searchBtn">Search</button>
        </div>

        <div class="filter-sort">
            <div class="filter-group">
                <label>Item Type:</label>
                <select id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="Toys">Toys</option>
                    <option value="Daily Items">Daily Items</option>
                    <option value="Electronic devices">Electronic devices</option>
                    <option value="Clothes & Accessories">Clothes & Accessories</option>
                    <option value="Others">Others</option>
                </select>
            </div>

            <div class="filSter-group">
                <label>Date Range:</label>
                <input type="date" id="startDate">
                <span>to</span>
                <input type="date" id="endDate">
            </div>

            <div class="sort-group">
                <label>Sort By:</label>
                <select id="sortBy">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A-Z (Item Name)</option>
                </select>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script src="search.js"></script>
    <br><br>
    <button type="button"   id="LostItemInputButton"  onclick="LostInputItem()">Post Item Lost</button>
    <button type="button"   id="HomePageButton"  onclick="HomePage()">Home Page</button>
</form>

<script>
    function LostInputItem(){
        window.location.href = "LostItemInput.html";
    }
    function HomePage(){
        window.location.href = "HomePage.html";
    }
</script>

<script>
    function get(){  
        var imgData = localStorage.getItem("LostInputImage");
        
        var get = {
            description: localStorage.getItem("LostInputDesciption"),
            location: localStorage.getItem("LostInputLocation"),
            date: localStorage.getItem("LostInputDate"),
            time: localStorage.getItem("LostInputTime"),
            contact: localStorage.getItem("LostInputContact"),
            remark: localStorage.getItem("LostInputRemark")
        };

        var types = JSON.parse(localStorage.getItem("LostInputType"));
        var typeText = "";
        if (types) {
            typeText = types.join(", ");
        }

        var output = document.getElementById("output")
        output.innerHTML = `
            <img src="${imgData}" width="200">;
            <p>Description: ${get.description}</p>
            <p>Location: ${get.location}</p>
            <p>Date: ${get.date}</p>
            <p>Time: ${get.time}</p>
            <p>Type: ${typeText}</p>
            <p>Contact: ${get.contact}</p>
            <p>Remark: ${get.remark}</p>
        `;
    }
</script>

</body>
</html>
