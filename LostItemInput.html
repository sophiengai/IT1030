<!DOCTYPE html>
<html>
<head>
    <title>Lost Item Input</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<form name="LostItemInput">
    <label for="LostInputImage">Upload images:</label>
    <input type="file" id="LostInputImage"  name="LostInputImage"   accept="image/*"><br><br>
    <label>Description:</label>
    <input type="text"  id="LostInputDesciption" required><br><br>
    <label>Lost Location:</label>
    <input type="text"  name="LostInputLocation" required><br><br>
    <label>Date:</label>
    <input type="date"  id="LostInputDate"  name="LostInputDate" required/><br><br>
    <label>Lost Time:</label>
    <input type="text"  name="LostInputTime" required><br><br>
    <label>Item type:</label>
    <input type="text"  name="LostInputItemType" required><br><br>
    <label>Contact:</label>
    <input type="text"  name="LostInputContact" required><br><br>
    <label>Remark:</label>
    <input type="text"  name="LostInputRemark"><br><br>
    <button type="button"   id="sumbit_button"  onclick="SumbitLostMessage()">Sumbit</button>
</form>

<script>
    var StorageDescription = localStorage.getItem("StorageDescription")

    function SumbitLostMessage() {
        var LostDescription = document.getElementById("LostInputDesciption").value;
        localStorage.setItem("StorageDescription", LostDescription);
        window.location.href = "HomePage.html";
    }
</script>

</body>
</html>
