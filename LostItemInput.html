<!DOCTYPE html>
<html>
<head>
    <title>Lost Item Input</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<form name="LostItemInput">
    <label for="LostInputImage">Upload images:</label>
    <input type="file" id="LostInputImage"  name="LostInputImage"   accept="image/*"><br><br>
    <label>Description:</label>
    <input type="text"  id="LostInputDesciption" required><br><br>
    <label>Lost Location:</label>
    <input type="text"  id="LostInputLocation" required><br><br>
    <label>Date:</label>
    <input type="date"  id="LostInputDate"  name="LostInputDate" required/><br><br>
    <label>Lost Time:</label>
    <input type="text"  id="LostInputTime" required><br><br>

    <label>Item type:</label><br>
    <input type="checkbox"  id="Toys" required>
    <label for="Toys">Toys</label><br>
    <input type="checkbox"  id="Daily Items" required>
    <label for="Daily Items">Daily Items</label><br>
    <input type="checkbox"  id="Electronic devices" required>
    <label for="Electronic devices">Electronic devices</label><br>
    <input type="checkbox"  id="Clothes & Accessories" required>
    <label for="Clothes & Accessories">Clothes & Accessories</label><br>
    <input type="checkbox"  id="Others" required>
    <label for="Others">Others</label><br><br>

    <label>Contact:</label>
    <input type="text"  id="LostInputContact" required><br><br>
    <label>Remark:</label>
    <input type="text"  id="LostInputRemark"><br><br>
    <button type="button"   id="sumbit_button"  onclick="SumbitLostMessage()">Sumbit</button>
</form>

<script>

    function SumbitLostMessage() {
        var StorageDescription = localStorage.setItem("LostInputDesciption", document.getElementById("LostInputDesciption"));
        window.location.href = "HomePage.html";
    }

</script>

</body>
</html>
