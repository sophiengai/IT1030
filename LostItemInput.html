<!DOCTYPE html>
<html>
<head>
    <title>Lost Item Input</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<form>
    <button type="button"   id="LostPageButton"  onclick="LostPage()">Lost Page</button>
</form>

<form name="LostItemInput">
    <label for="LostInputImage">Upload images:</label>
    <input type="file" id="LostInputImage"  name="LostInputImage"   accept="image/*"><br><br>
    <label for="LostInputDesciption">Description:</label>
    <input type="text"  id="LostInputDesciption"><br><br>
    <label>Lost Location:</label>
    <input type="text"  id="LostInputLocation"><br><br>
    <label>Date:</label>
    <input type="date"  id="LostInputDate"  name="LostInputDate"/><br><br>
    <label>Lost Time:</label>
    <input type="text"  id="LostInputTime"><br><br>

    <input type="checkbox" name="type" value="Toys"> Toys<br>
    <input type="checkbox" name="type" value="Daily Items"> Daily Items<br>
    <input type="checkbox" name="type" value="Electronic Devices"> Electronic Devices<br>
    <input type="checkbox" name="type" value="Clothes & Accessories"> Clothes & Accessories<br>
    <input type="checkbox" name="type" value="Others"> Others<br><br>

    <label>Contact:</label>
    <input type="text"  id="LostInputContact"><br><br>
    <label>Remark:</label>
    <input type="text"  id="LostInputRemark"><br><br>
    <button type="button"   id="sumbit_button"  onclick="SumbitLostMessage()">Sumbit</button>
</form>

<script>
    function LostPage(){
        window.location.href = "LostPage.html";
    }
</script>

<script>
    function SumbitLostMessage() {
        if (document.getElementById("LostInputImage").value === "") {
            alert("An image is required!");
        } else if (document.getElementById("LostInputDesciption").value === "") {
            alert("Description is required!");
        } else if (document.getElementById("LostInputLocation").value === "") {
            alert("Lost location is required!");
        } else if (document.getElementById("LostInputDate").value === "") {
            alert("Lost date is required!");
        } else if (document.getElementById("LostInputTime").value === "") {
            alert("Lost time is required!");
        } else if (document.getElementById("LostInputContact").value === "") {
            alert("Contact is required!");
        } else {
            var fileInput = document.getElementById("LostInputImage");
            var file = fileInput.files[0];

            var StorageDescription = document.getElementById("LostInputDesciption").value;
            var StorageLocation = document.getElementById("LostInputLocation").value;
            var StorageDate = document.getElementById("LostInputDate").value;
            var StorageTime = document.getElementById("LostInputTime").value;
            var StorageContact = document.getElementById("LostInputContact").value;
            var StorageRemark = document.getElementById("LostInputRemark").value;

            var types = document.querySelectorAll('input[name="type"]:checked');
            var selectedTypes = [];

            types.forEach(function(item){
                selectedTypes.push(item.value);
            });


            localStorage.setItem("LostInputDesciption", StorageDescription);
            localStorage.setItem("LostInputLocation", StorageLocation);
            localStorage.setItem("LostInputDate", StorageDate);
            localStorage.setItem("LostInputTime", StorageTime);
            localStorage.setItem("LostInputContact", StorageContact);
            localStorage.setItem("LostInputRemark", StorageRemark);

            localStorage.setItem("LostInputType", JSON.stringify(selectedTypes));

            if (file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var imageData = e.target.result;
                    localStorage.setItem("LostInputImage", imageData);

                    window.location.href = "HomePage.html";
                };
                reader.readAsDataURL(file);
            }

        }
            
    }

</script>

</body>
</html>
