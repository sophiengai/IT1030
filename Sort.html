<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorting?</title>
    <link rel="stylesheet" href="styles316.css">
</head>
<body>
   <script>
    /**
 * Sorts an array of lost & found items alphabetically by a specified string field.
 * Safe, case-insensitive, handles missing values, stable sort.
 *
 * @param {Object[]} items - Array of items (same structure as mockItems)
 * @param {string} key - Field to sort by: "description", "where", "type", "contact", etc.
 * @param {"asc"|"desc"} [direction="asc"] - "asc" = A→Z, "desc" = Z→A
 * @returns {Object[]} New sorted array (original array is not changed)
 */
function sortAlphabetically(items, key, direction = "asc") {
    // Guard clauses
    if (!Array.isArray(items) || items.length === 0) {
        return [];
    }

    if (typeof key !== "string" || !key.trim()) {
        console.warn("sortAlphabetically: Invalid or empty key. Returning original array.");
        return [...items];
    }

    return [...items].sort((a, b) => {
        // Safely get values (missing → empty string)
        const valA = (a[key] || "").toString().trim().toLowerCase();
        const valB = (b[key] || "").toString().trim().toLowerCase();

        // Alphabetical comparison
        if (valA < valB) return direction === "asc" ? -1 : 1;
        if (valA > valB) return direction === "asc" ? 1 : -1;

        return 0; // equal → stable sort preserves original order
    });
}


   </script>

</body>
</html>
