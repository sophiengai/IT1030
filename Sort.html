<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorting</title>
</head>
<body>
<script>
    
    function sortAlphabetically(items, key, direction = "asc") {

        if (!Array.isArray(items) || items.length === 0) {
            return [];
        }

        if (typeof key !== "string" || !key.trim()) {
            console.warn("sortAlphabetically: Invalid or empty key. Returning original array.");
            return [...items];
        }

        return [...items].sort((a, b) => {

            var valA = (a[key] || "").toString().trim().toLowerCase();
            var valB = (b[key] || "").toString().trim().toLowerCase();

            if (valA < valB) return direction === "asc" ? -1 : 1;
            if (valA > valB) return direction === "asc" ? 1 : -1;

            return 0;
        });
    }


</script>

</body>
</html>
